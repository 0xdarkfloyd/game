<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#20013;&#22283;&#35937;&#26827;</title>
    <link rel="stylesheet" href="styles.css?v=20260326-advancedfix2">
</head>
<body>
    <div class="game-container">
        <h1>&#20013;&#22283;&#35937;&#26827;</h1>
        <div class="game-layout">
            <section class="board-column">
                <div class="info-panel">
                    <div id="turn" class="turn-label"></div>
                    <div id="status" class="status-label"></div>
                    <div class="side-picker" role="group" aria-label="Choose side">
                        <button id="side-red" type="button" class="side-button active" onclick="setHumanSide('r')">&#x57f7;&#32005;&#20808;&#25163;</button>
                        <button id="side-black" type="button" class="side-button" onclick="setHumanSide('b')">&#x57f7;&#40657;&#24460;&#25163;</button>
                    </div>
                    <div class="difficulty-picker" role="group" aria-label="Choose difficulty">
                        <button id="level-beginner" type="button" class="difficulty-button" onclick="setAiLevel('beginner')">&#x521d;&#32026;</button>
                        <button id="level-intermediate" type="button" class="difficulty-button active" onclick="setAiLevel('intermediate')">&#x4e2d;&#32026;</button>
                        <button id="level-advanced" type="button" class="difficulty-button" onclick="setAiLevel('advanced')">&#x9ad8;&#32026;</button>
                    </div>
                </div>
                <div id="board" class="board" aria-label="Xiangqi board"></div>
                <div class="action-row">
                    <button type="button" class="secondary-button" onclick="undoMove()">&#24724;&#26827;</button>
                    <button type="button" onclick="resetGame()">&#37325;&#26032;&#38283;&#22987;</button>
                </div>
            </section>
            <aside class="history-panel" aria-label="Move log">
                <h2 class="history-title">&#26827;&#35676;</h2>
                <div id="move-log" class="move-log"></div>
            </aside>
        </div>
    </div>
    <script src="engine-core.js?v=20260326-advancedfix2"></script>
    <script src="game.js?v=20260326-advancedfix2"></script>
</body>
</html>
