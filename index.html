<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#20013;&#22283;&#35937;&#26827;</title>
    <link rel="stylesheet" href="styles.css?v=20260330-opening1">
</head>
<body>
    <div class="game-container">
        <h1>&#20013;&#22283;&#35937;&#26827;</h1>
        <section id="setup-panel" class="setup-panel" aria-label="Game setup">
            <h2 class="setup-title">&#20808;&#36984;&#25799;&#23565;&#23616;&#35373;&#23450;</h2>
            <p class="setup-copy">&#20808;&#36984;&#27169;&#24335;&#12289;&#22519;&#33394;&#33287;&#38627;&#24230;&#65292;&#20877;&#38283;&#22987;&#23565;&#23616;&#12290;&#38617;&#20154;&#27169;&#24335;&#21487;&#29992;&#26044;&#26412;&#27231;&#38617;&#20154;&#23565;&#24319;&#25110;&#25163;&#21205;&#28204;&#35430;&#23616;&#38754;&#12290;</p>
            <div class="setup-group">
                <div class="setup-label">&#27169;&#24335;</div>
                <div class="side-picker" role="group" aria-label="Choose mode">
                    <button id="mode-ai" type="button" class="side-button active" onclick="setGameMode('ai')">&#20154;&#27231;&#23565;&#23616;</button>
                    <button id="mode-local" type="button" class="side-button" onclick="setGameMode('local')">&#38617;&#20154;&#28204;&#35430;</button>
                </div>
            </div>
            <div class="setup-group">
                <div id="side-label" class="setup-label">&#22519;&#33394;</div>
                <div class="side-picker" role="group" aria-label="Choose side">
                    <button id="side-red" type="button" class="side-button active" onclick="setHumanSide('r')">&#x57f7;&#32005;&#20808;&#25163;</button>
                    <button id="side-black" type="button" class="side-button" onclick="setHumanSide('b')">&#x57f7;&#40657;&#24460;&#25163;</button>
                </div>
            </div>
            <div id="difficulty-group" class="setup-group">
                <div class="setup-label">&#38627;&#24230;</div>
                <div class="difficulty-picker setup-difficulty-picker" role="group" aria-label="Choose difficulty">
                    <button id="level-beginner" type="button" class="difficulty-button" onclick="setAiLevel('beginner')">
                        <span class="difficulty-name">&#x521d;&#32026;</span>
                        <span class="difficulty-time">1200-1500ms</span>
                    </button>
                    <button id="level-intermediate" type="button" class="difficulty-button" onclick="setAiLevel('intermediate')">
                        <span class="difficulty-name">&#x4e2d;&#32026;</span>
                        <span class="difficulty-time">3600-5000ms</span>
                    </button>
                    <button id="level-advanced" type="button" class="difficulty-button" onclick="setAiLevel('advanced')">
                        <span class="difficulty-name">&#x9ad8;&#32026;</span>
                        <span class="difficulty-time">6500-10000ms</span>
                    </button>
                </div>
            </div>
            <div id="setup-status" class="setup-status"></div>
            <button id="start-game-button" type="button" class="start-game-button" onclick="startConfiguredGame()">&#38283;&#22987;&#23565;&#23616;</button>
        </section>
        <div id="game-layout" class="game-layout">
            <section class="board-column">
                <div class="info-panel">
                    <div id="turn" class="turn-label"></div>
                    <div id="status" class="status-label"></div>
                    <div id="game-settings" class="game-settings"></div>
                </div>
                <div id="board" class="board" aria-label="Xiangqi board"></div>
                <div class="action-row">
                    <button id="undo-button" type="button" class="secondary-button" onclick="undoMove()">&#24724;&#26827;</button>
                    <button type="button" class="secondary-button" onclick="openSetupPanel()">&#23565;&#23616;&#35373;&#23450;</button>
                    <button type="button" onclick="resetGame()">&#37325;&#26032;&#38283;&#22987;</button>
                </div>
            </section>
            <aside class="history-panel" aria-label="Move log">
                <h2 class="history-title">&#26827;&#35676;</h2>
                <div id="move-log" class="move-log"></div>
            </aside>
        </div>
    </div>
    <script src="engine-core.js?v=20260330-opening1"></script>
    <script src="game.js?v=20260330-opening1"></script>
</body>
</html>
