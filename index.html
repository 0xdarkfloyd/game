<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国象棋 - Chinese Chess</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin: 0 0 20px 0;
            font-size: 28px;
        }

        .info {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #555;
        }

        #boardContainer {
            position: relative;
            background: #f5deb3;
            border: 5px solid #8b4513;
            padding: 40px;
            display: inline-block;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        #board {
            position: relative;
            width: 480px;
            height: 540px;
        }

        /* Lines */
        .line {
            position: absolute;
            background: #000;
        }

        .h-line {
            height: 2px;
            width: 480px;
        }

        .v-line {
            width: 2px;
            height: 540px;
        }

        .v-line-top {
            width: 2px;
            height: 240px;
        }

        .v-line-bottom {
            width: 2px;
            height: 240px;
        }

        /* Palace diagonal lines */
        .palace-line {
            position: absolute;
            background: #000;
            height: 2px;
            transform-origin: 0 0;
        }

        /* River text */
        .river-text {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            color: #1e3a8a;
            letter-spacing: 8px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        /* Chess pieces */
        .piece {
            position: absolute;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid;
            transition: all 0.15s ease;
            z-index: 10;
            user-select: none;
        }

        .piece:hover {
            transform: scale(1.12);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            z-index: 15;
        }

        .piece.red {
            background: radial-gradient(circle at 30% 30%, #ff8787, #ff6b6b 45%, #ee5a6f);
            color: white;
            border-color: #c92a2a;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.4);
        }

        .piece.black {
            background: radial-gradient(circle at 30% 30%, #4a4a4a, #2c2c2c 45%, #1a1a1a);
            color: white;
            border-color: #000;
            text-shadow: 2px 2px 3px rgba(0,0,0,0.6);
        }

        .piece.selected {
            box-shadow: 0 0 0 4px #ffd700, 0 0 20px rgba(255,215,0,0.6), 0 6px 20px rgba(0,0,0,0.5);
            transform: scale(1.2);
            z-index: 20;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 4px #ffd700, 0 0 20px rgba(255,215,0,0.6), 0 6px 20px rgba(0,0,0,0.5);
            }
            50% {
                box-shadow: 0 0 0 4px #ffd700, 0 0 30px rgba(255,215,0,0.8), 0 6px 20px rgba(0,0,0,0.5);
            }
        }

        /* Valid move indicators */
        .valid-move-indicator {
            position: absolute;
            width: 22px;
            height: 22px;
            background: radial-gradient(circle, #90ee90, #6dc46d);
            border-radius: 50%;
            border: 2px solid #2d5016;
            z-index: 5;
            pointer-events: none;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Clickable intersections */
        .intersection {
            position: absolute;
            width: 20px;
            height: 20px;
            margin-left: -10px;
            margin-top: -10px;
            cursor: pointer;
            z-index: 1;
            border-radius: 50%;
        }

        .intersection:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Button */
        button {
            display: block;
            margin: 20px auto 0;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 中国象棋 Chinese Chess 🎮</h1>
        <div class="info">
            <span id="turn">红方回合 (Red's Turn)</span>
        </div>
        <div id="boardContainer">
            <div id="board"></div>
        </div>
        <button onclick="resetGame()">重新开始 New Game</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
