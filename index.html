<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国象棋 - Chinese Chess</title>
    <style>
        body {
            font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin: 0 0 20px 0;
        }

        .info {
            text-align: center;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #555;
        }

        #boardContainer {
            position: relative;
            background: #f5deb3;
            border: 4px solid #8b4513;
            padding: 30px;
            display: inline-block;
        }

        #board {
            position: relative;
            width: 480px;
            height: 540px;
        }

        .line {
            position: absolute;
            background: #000;
        }

        .h-line {
            height: 2px;
            width: 480px;
        }

        .v-line {
            width: 2px;
            height: 540px;
        }

        .v-line-top {
            width: 2px;
            height: 240px;
        }

        .v-line-bottom {
            width: 2px;
            height: 240px;
        }

        .palace-line {
            position: absolute;
            background: #000;
            height: 2px;
            transform-origin: 0 0;
        }

        .river-text {
            position: absolute;
            font-size: 32px;
            font-weight: bold;
            color: #1e3a8a;
            letter-spacing: 10px;
        }

        .piece {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid;
            transition: all 0.2s;
            z-index: 10;
        }

        .piece:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .piece.red {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            border-color: #c92a2a;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .piece.black {
            background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%);
            color: white;
            border-color: #000;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .piece.selected {
            box-shadow: 0 0 0 4px #ffd700, 0 4px 12px rgba(0,0,0,0.4);
            transform: scale(1.15);
            z-index: 20;
        }

        .valid-move-indicator {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #90ee90;
            border-radius: 50%;
            border: 2px solid #2d5016;
            z-index: 5;
            pointer-events: none;
        }

        .intersection {
            position: absolute;
            width: 16px;
            height: 16px;
            margin-left: -8px;
            margin-top: -8px;
            cursor: pointer;
            z-index: 1;
        }

        button {
            display: block;
            margin: 15px auto;
            padding: 10px 30px;
            font-size: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 中国象棋 Chinese Chess 🎮</h1>
        <div class="info">
            <span id="turn">红方回合 (Red's Turn)</span>
        </div>
        <div id="boardContainer">
            <div id="board"></div>
        </div>
        <button onclick="resetGame()">重新开始 New Game</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
