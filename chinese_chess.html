<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国象棋 - Chinese Chess</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin: 0 0 20px 0;
        }

        .info {
            text-align: center;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #555;
        }

        #board {
            background: #f0d9a0;
            border: 3px solid #8b4513;
            padding: 20px;
            display: inline-block;
        }

        .row {
            display: flex;
        }

        .cell {
            width: 50px;
            height: 50px;
            border: 1px solid #8b4513;
            position: relative;
            cursor: pointer;
            background: #f0d9a0;
        }

        .cell:hover {
            background: #e6d199;
        }

        .cell.selected {
            background: #ffd700 !important;
        }

        .cell.valid-move {
            background: #90ee90 !important;
        }

        .piece {
            position: absolute;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            border: 2px solid;
        }

        .piece.red {
            background: #ff6b6b;
            color: white;
            border-color: #c92a2a;
        }

        .piece.black {
            background: #2c2c2c;
            color: white;
            border-color: #000;
        }

        .river {
            border-top: 2px solid #4682b4;
            border-bottom: 2px solid #4682b4;
        }

        button {
            display: block;
            margin: 15px auto;
            padding: 10px 30px;
            font-size: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 中国象棋 Chinese Chess 🎮</h1>
        <div class="info">
            <span id="turn">红方回合 (Red's Turn)</span>
        </div>
        <div id="board"></div>
        <button onclick="resetGame()">重新开始 New Game</button>
    </div>

    <script>
        // Initial board setup
        const initialBoard = [
            ['r車', 'r馬', 'r象', 'r士', 'r将', 'r士', 'r象', 'r馬', 'r車'],
            ['', '', '', '', '', '', '', '', ''],
            ['', 'r炮', '', '', '', '', '', 'r炮', ''],
            ['r兵', '', 'r兵', '', 'r兵', '', 'r兵', '', 'r兵'],
            ['', '', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', '', ''],
            ['b卒', '', 'b卒', '', 'b卒', '', 'b卒', '', 'b卒'],
            ['', 'b砲', '', '', '', '', '', 'b砲', ''],
            ['', '', '', '', '', '', '', '', ''],
            ['b车', 'b马', 'b相', 'b仕', 'b帅', 'b仕', 'b相', 'b马', 'b车']
        ];

        let board = JSON.parse(JSON.stringify(initialBoard));
        let currentPlayer = 'r'; // 'r' for red, 'b' for black
        let selectedCell = null;
        let validMoves = [];

        const pieceNames = {
            '車': '車', '车': '车', '馬': '馬', '马': '马',
            '象': '象', '相': '相', '士': '士', '仕': '仕',
            '将': '将', '帅': '帅', '炮': '炮', '砲': '砲',
            '兵': '兵', '卒': '卒'
        };

        function createBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';

            for (let row = 0; row < 10; row++) {
                const rowElement = document.createElement('div');
                rowElement.className = 'row';

                for (let col = 0; col < 9; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;

                    if (row === 4 || row === 5) {
                        cell.classList.add('river');
                    }

                    const piece = board[row][col];
                    if (piece) {
                        const pieceElement = document.createElement('div');
                        pieceElement.className = 'piece ' + (piece[0] === 'r' ? 'red' : 'black');
                        pieceElement.textContent = piece.substring(1);
                        cell.appendChild(pieceElement);
                    }

                    cell.addEventListener('click', () => handleCellClick(row, col));
                    rowElement.appendChild(cell);
                }

                boardElement.appendChild(rowElement);
            }
        }

        function handleCellClick(row, col) {
            const piece = board[row][col];

            // If a piece is already selected
            if (selectedCell) {
                // Check if this is a valid move
                if (validMoves.some(m => m.row === row && m.col === col)) {
                    // Make the move
                    movePiece(selectedCell.row, selectedCell.col, row, col);
                    clearSelection();

                    // Switch player and let computer play
                    if (currentPlayer === 'b') {
                        setTimeout(computerMove, 500);
                    }
                } else {
                    // Select new piece if it belongs to current player
                    clearSelection();
                    if (piece && piece[0] === currentPlayer) {
                        selectPiece(row, col);
                    }
                }
            } else {
                // Select piece if it belongs to current player
                if (piece && piece[0] === currentPlayer) {
                    selectPiece(row, col);
                }
            }
        }

        function selectPiece(row, col) {
            selectedCell = { row, col };
            validMoves = getValidMoves(row, col);

            // Highlight selected cell and valid moves
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const cellRow = parseInt(cell.dataset.row);
                const cellCol = parseInt(cell.dataset.col);

                if (cellRow === row && cellCol === col) {
                    cell.classList.add('selected');
                } else if (validMoves.some(m => m.row === cellRow && m.col === cellCol)) {
                    cell.classList.add('valid-move');
                }
            });
        }

        function clearSelection() {
            selectedCell = null;
            validMoves = [];
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('selected', 'valid-move');
            });
        }

        function movePiece(fromRow, fromCol, toRow, toCol) {
            board[toRow][toCol] = board[fromRow][fromCol];
            board[fromRow][fromCol] = '';
            currentPlayer = currentPlayer === 'r' ? 'b' : 'r';
            updateTurnDisplay();
            createBoard();

            // Check for game over
            checkGameOver();
        }

        function getValidMoves(row, col) {
            const piece = board[row][col];
            if (!piece) return [];

            const pieceType = piece.substring(1);
            const color = piece[0];
            const moves = [];

            switch (pieceType) {
                case '車':
                case '车':
                    // Rook moves (horizontal and vertical)
                    for (let direction of [[0, 1], [0, -1], [1, 0], [-1, 0]]) {
                        let newRow = row + direction[0];
                        let newCol = col + direction[1];
                        while (newRow >= 0 && newRow < 10 && newCol >= 0 && newCol < 9) {
                            if (!board[newRow][newCol]) {
                                moves.push({ row: newRow, col: newCol });
                            } else {
                                if (board[newRow][newCol][0] !== color) {
                                    moves.push({ row: newRow, col: newCol });
                                }
                                break;
                            }
                            newRow += direction[0];
                            newCol += direction[1];
                        }
                    }
                    break;

                case '馬':
                case '马':
                    // Horse moves
                    const horseMoves = [
                        [2, 1, 1, 0], [2, -1, 1, 0], [-2, 1, -1, 0], [-2, -1, -1, 0],
                        [1, 2, 0, 1], [-1, 2, 0, 1], [1, -2, 0, -1], [-1, -2, 0, -1]
                    ];
                    for (let [dr, dc, blockR, blockC] of horseMoves) {
                        const newRow = row + dr;
                        const newCol = col + dc;
                        const blockRow = row + blockR;
                        const blockCol = col + blockC;

                        if (newRow >= 0 && newRow < 10 && newCol >= 0 && newCol < 9 &&
                            !board[blockRow][blockCol]) {
                            if (!board[newRow][newCol] || board[newRow][newCol][0] !== color) {
                                moves.push({ row: newRow, col: newCol });
                            }
                        }
                    }
                    break;

                case '象':
                case '相':
                    // Elephant moves (stays on own side)
                    const maxRow = color === 'r' ? 4 : 10;
                    const minRow = color === 'r' ? 0 : 5;
                    const elephantMoves = [[2, 2], [2, -2], [-2, 2], [-2, -2]];
                    for (let [dr, dc] of elephantMoves) {
                        const newRow = row + dr;
                        const newCol = col + dc;
                        const blockRow = row + dr / 2;
                        const blockCol = col + dc / 2;

                        if (newRow >= minRow && newRow < maxRow && newCol >= 0 && newCol < 9 &&
                            !board[blockRow][blockCol]) {
                            if (!board[newRow][newCol] || board[newRow][newCol][0] !== color) {
                                moves.push({ row: newRow, col: newCol });
                            }
                        }
                    }
                    break;

                case '士':
                case '仕':
                    // Advisor moves (within palace)
                    const palaceRows = color === 'r' ? [0, 1, 2] : [7, 8, 9];
                    const palaceCols = [3, 4, 5];
                    const advisorMoves = [[1, 1], [1, -1], [-1, 1], [-1, -1]];
                    for (let [dr, dc] of advisorMoves) {
                        const newRow = row + dr;
                        const newCol = col + dc;

                        if (palaceRows.includes(newRow) && palaceCols.includes(newCol)) {
                            if (!board[newRow][newCol] || board[newRow][newCol][0] !== color) {
                                moves.push({ row: newRow, col: newCol });
                            }
                        }
                    }
                    break;

                case '将':
                case '帅':
                    // General moves (within palace)
                    const genPalaceRows = color === 'r' ? [0, 1, 2] : [7, 8, 9];
                    const genPalaceCols = [3, 4, 5];
                    const generalMoves = [[0, 1], [0, -1], [1, 0], [-1, 0]];
                    for (let [dr, dc] of generalMoves) {
                        const newRow = row + dr;
                        const newCol = col + dc;

                        if (genPalaceRows.includes(newRow) && genPalaceCols.includes(newCol)) {
                            if (!board[newRow][newCol] || board[newRow][newCol][0] !== color) {
                                moves.push({ row: newRow, col: newCol });
                            }
                        }
                    }
                    break;

                case '炮':
                case '砲':
                    // Cannon moves
                    for (let direction of [[0, 1], [0, -1], [1, 0], [-1, 0]]) {
                        let newRow = row + direction[0];
                        let newCol = col + direction[1];
                        let jumped = false;

                        while (newRow >= 0 && newRow < 10 && newCol >= 0 && newCol < 9) {
                            if (!board[newRow][newCol]) {
                                if (!jumped) {
                                    moves.push({ row: newRow, col: newCol });
                                }
                            } else {
                                if (!jumped) {
                                    jumped = true;
                                } else {
                                    if (board[newRow][newCol][0] !== color) {
                                        moves.push({ row: newRow, col: newCol });
                                    }
                                    break;
                                }
                            }
                            newRow += direction[0];
                            newCol += direction[1];
                        }
                    }
                    break;

                case '兵':
                case '卒':
                    // Soldier moves
                    const forward = color === 'r' ? 1 : -1;
                    const crossedRiver = color === 'r' ? row > 4 : row < 5;

                    // Forward move
                    if (row + forward >= 0 && row + forward < 10) {
                        if (!board[row + forward][col] || board[row + forward][col][0] !== color) {
                            moves.push({ row: row + forward, col });
                        }
                    }

                    // Horizontal moves (only after crossing river)
                    if (crossedRiver) {
                        if (col > 0 && (!board[row][col - 1] || board[row][col - 1][0] !== color)) {
                            moves.push({ row, col: col - 1 });
                        }
                        if (col < 8 && (!board[row][col + 1] || board[row][col + 1][0] !== color)) {
                            moves.push({ row, col: col + 1 });
                        }
                    }
                    break;
            }

            return moves;
        }

        function computerMove() {
            // Simple AI: find all possible moves and choose randomly
            const allMoves = [];

            for (let row = 0; row < 10; row++) {
                for (let col = 0; col < 9; col++) {
                    const piece = board[row][col];
                    if (piece && piece[0] === 'b') {
                        const moves = getValidMoves(row, col);
                        moves.forEach(move => {
                            allMoves.push({ fromRow: row, fromCol: col, toRow: move.row, toCol: move.col });
                        });
                    }
                }
            }

            if (allMoves.length > 0) {
                const move = allMoves[Math.floor(Math.random() * allMoves.length)];
                movePiece(move.fromRow, move.fromCol, move.toRow, move.toCol);
            }
        }

        function checkGameOver() {
            let redGeneral = false;
            let blackGeneral = false;

            for (let row = 0; row < 10; row++) {
                for (let col = 0; col < 9; col++) {
                    const piece = board[row][col];
                    if (piece === 'r将' || piece === 'r帅') redGeneral = true;
                    if (piece === 'b将' || piece === 'b帅') blackGeneral = true;
                }
            }

            if (!redGeneral) {
                alert('黑方胜利！Black wins!');
                resetGame();
            } else if (!blackGeneral) {
                alert('红方胜利！Red wins!');
                resetGame();
            }
        }

        function updateTurnDisplay() {
            const turnElement = document.getElementById('turn');
            turnElement.textContent = currentPlayer === 'r' ? '红方回合 (Red\'s Turn)' : '黑方回合 (Black\'s Turn)';
        }

        function resetGame() {
            board = JSON.parse(JSON.stringify(initialBoard));
            currentPlayer = 'r';
            selectedCell = null;
            validMoves = [];
            updateTurnDisplay();
            createBoard();
        }

        // Initialize the game
        createBoard();
    </script>
</body>
</html>
